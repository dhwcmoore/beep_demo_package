# stress_demo.toml — calibrated for 110-row three-phase demo scenarios.
#
# Scenario structure (generated by beep_work/gen_fixtures.py):
#   Rows   0– 49  WARMUP    calm baseline, fills capacity window
#   Rows  50– 69  PHASE 1   calm operation (nominal)
#   Rows  70– 89  PHASE 2   stressed regime
#   Rows  90–109  PHASE 3   collapse / structural failure
#
# Calibration intent:
#   - No detection during warmup or Phase 1
#   - First confirmed rupture in rows 70–77 (onset of Phase 2)
#   - Second event (if any) in rows 90–97 (onset of Phase 3)
#
# Key differences from stress.toml:
#   - robust_scale_n raised to 15  (stable scale after warmup; doesn't blow up in first 5 bars)
#   - theta_vol/liq/acc raised      (residuals are zero during calm, non-zero during stress)
#   - rho_stressed/critical/rupture raised above 1.0 steady-state noise floor

[io]
timestamp_column = "timestamp"
open_column      = "open"
high_column      = "high"
low_column       = "low"
close_column     = "close"
volume_column    = "volume"
parse_timestamps = false
drop_invalid_rows = true
sort_by_timestamp = false

[preprocess]
require_positive_close = true
allow_zero_volume      = true
min_rows = 60

[numerics]
eps = 1.0e-12
clip_residuals = true
residual_clip_max = 25.0

[windows]
robust_scale_n = 50
memory_k = 20
capacity_l = 100

[features]
use_log_returns = true

[robust]
mad_scale_factor = 1.4826
use_volume_median = true

[residuals]
# Deadband thresholds: residuals are zero below these levels.
# theta_vol=1.5 means calm daily vol (u≈0.4) produces no residual;
# a 2× vol spike (u≈3) produces r_vol≈1.5.
theta_vol = 1.50
theta_liq = 1.25
theta_acc = 1.50

[combine]
tau = 0.35

[memory]
alpha = 0.65

[capacity]
q = 0.95
smooth = true
lambda = 0.005
e_min = 0.01

[state_machine]
# Raised above the 1.0 steady-state baseline of rho = strain/capacity.
# During calm: rho converges to ~1.0 (no trigger).
# During stress: residuals push strain above capacity → rho > 1.25 (trigger).
rho_stressed = 0.80
rho_critical = 2.0
rho_rupture  = 12.0
confirm_k = 3
confirm_m = 2
enable_recovery = true
recovery_hold = 3

[outputs]
write_csv_timeseries = true
csv_timeseries_name  = "rupture_timeseries.csv"
write_json_events = true
json_events_name  = "rupture_events.json"
write_json_config_snapshot = true
json_config_snapshot_name  = "config_used.json"

[detection]
auto_warmup_min = 30
auto_warmup_stable_bars = 4
auto_warmup_rel_tol = 0.10
